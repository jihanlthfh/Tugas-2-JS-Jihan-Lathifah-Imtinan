<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2_JS_Jihan Lathifah Imtinan</title>
</head>
<body>
    <script>
        let nama = "Dodi Prayodi";
        let umur = 25;
        let jabatan = "Manajer";
        let status = "Menikah";

        let gajiPokok;
        //nentuin gaji pokok
        if(jabatan == "Manajer"){
            gajiPokok = 15000000;
        }
        else if(jabatan == "Asisten Manajer"){
            gajiPokok = 10000000;
        }
        else{
            gajiPokok = 5000000;
        }

        //perhitungannya
        let tunjanganJabatan = 0.15 * gajiPokok;
        let bpjs = 0.10 * gajiPokok;
        let tunjanganKeluarga = (status == "Menikah") ? 0.20 * gajiPokok : 0;

        let totalGaji = gajiPokok + tunjanganJabatan + bpjs + tunjanganKeluarga;

        //buat tabelnya
        document.write("<table border='1' cellpadding='10' align='center'>");

        document.write("<caption><b>TABEL GAJI PEGAWAI</b></caption>");
        
        //thead
        document.write("<thead>");
        document.write("<tr>");
        document.write("<th>Nama Pegawai</th>");
        document.write("<th>Umur</th>");
        document.write("<th>Jabatan</th>");
        document.write("<th>Status</th>");
        document.write("<th>Gaji Pokok</th>");
        document.write("<th>Tunjangan Jabatan</th>");
        document.write("<th>BPJS</th>");
        document.write("<th>Tunjangan Keluarga</th>");
        document.write("</tr>");
        document.write("</thead>");
        
        //tbody
        document.write("<tbody>");
        document.write("<tr>");
        document.write("<td>"+nama+"</td>");
        document.write("<td>"+umur+"</td>");
        document.write("<td>"+jabatan+"</td>");
        document.write("<td>"+status+"</td>");
        document.write("<td>Rp "+gajiPokok.toLocaleString("id-ID")+"</td>");
        document.write("<td>Rp "+tunjanganJabatan.toLocaleString("id-ID")+"</td>");
        document.write("<td>Rp "+bpjs.toLocaleString("id-ID")+"</td>");
        document.write("<td>Rp "+tunjanganKeluarga.toLocaleString("id-ID")+"</td>");
        document.write("</tr>");
        document.write("</tbody>");
        
        //tfoot
        document.write("<tfoot>");
        document.write("<tr>");
        document.write("<th colspan='7'>Total Gaji</th>");
        document.write("<th>Rp "+totalGaji.toLocaleString("id-ID")+"</th>");
        document.write("</tr>");
        document.write("</tfoot>");

        document.write("</table>");
    </script>
</body>
</html>
